<html>
<head>
    <title>Dark Mode Toggle</title>
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
    </script>
    <style>
        body.dark-mode {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Welcome to Dark Mode Toggle</h1>
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
</body>
</html>
